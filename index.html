<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Diversey Koleso šťastia</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding: 40px;
}
.container {
    display: flex;
    gap: 40px;
    align-items: flex-start;
}
#wheelCanvas {
    width: 420px;
    height: 420px;
}
#pointer {
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-bottom: 40px solid red;
    position: relative;
    left: 180px;
    top: -10px;
}
.form-box {
    width: 300px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}
button {
    width: 100%;
    padding: 12px;
    background: #2ecc71;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #27ae60;
}
#result {
    font-weight: bold;
    margin-top: 15px;
}
</style>
</head>
<body>

<div class="container">

    <div>
        <div id="pointer"></div>
        <canvas id="wheelCanvas" width="420" height="420"></canvas>
    </div>

    <div class="form-box">
        <h2>Diversey Koleso šťastia</h2>

        <input id="name" placeholder="Vaše meno">
        <input id="email" placeholder="Váš email">
        <input id="phone" placeholder="Vaše tel. číslo">

        <label>
            <input type="checkbox" id="consent"> Súhlasím so spracovaním údajov
        </label>

        <button onclick="spinWheel()">ROZTOČ KOLESO!</button>

        <p id="result"></p>
    </div>

</div>

<script>
// TEXTY SEGMENTOV Z OBRÁZKA
const segments = [
    "Mrzí ma to",
    "Dnes to nevyšlo",
    "Temer! Ešte raz skúste",
    "Veľký balík čistiacich prostriedkov",
    "Radosť zo záradenia",
    "Lesso! Vyhrali ste malú odmenu",
    "Vyzerá fajn! Tlap! DEO",
    "TO je škoda!",
    "Úžasná malá odmena",
    "Čisté prekvapenie"
];

// TVOJE VÝHERNÉ NÁZVY
const prizeMapping = {
    "Veľký balík čistiacich prostriedkov": "Veľký balíček chémie",
    "Lesso! Vyhrali ste malú odmenu": "Lesseau mydlá",
    "Úžasná malá odmena": "Cify",
    "Vyzerá fajn! Tlap! DEO": "Vzorka Tapi Deo"
};

// LIMITY VÝHIER
let limits = {
    "Veľký balíček chémie": 1,
    "Lesseau mydlá": 1,
    "Cify": 6,
    "Vzorka Tapi Deo": 40
};

// FARBY SEGMENTOV – sampling z obrázka
const colors = [
    "#4A90E2", // modrá
    "#7ED321", // zelená
    "#F8E71C", // žltá
    "#F5A623", // oranžová
    "#D0021B", // červená
    "#9013FE", // fialová
    "#50E3C2", // tyrkysová
    "#FF6EC7", // ružová
    "#B8E986", // svetlozelená
    "#4A4DE2"  // tmavomodrá
];

// CANVAS KOLESO
const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");
const radius = canvas.width / 2;
const segAngle = 2 * Math.PI / segments.length;

function drawWheel() {
    for (let i = 0; i < segments.length; i++) {
        const start = i * segAngle;
        const end = start + segAngle;

        ctx.beginPath();
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius, start, end);
        ctx.fillStyle = colors[i];
        ctx.fill();
        ctx.stroke();

        // TEXT
        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(start + segAngle / 2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#000";
        ctx.font = "16px Arial";
        ctx.fillText(segments[i], radius - 10, 5);
        ctx.restore();
    }
}

drawWheel();

let spinning = false;
let rotation = 0;

function spinWheel() {
    if (spinning) return;

    if (!name.value || !email.value || !phone.value) {
        alert("Vyplňte všetky údaje");
        return;
    }
    if (!consent.checked) {
        alert("Musíte súhlasiť so spracovaním údajov");
        return;
    }
    if (localStorage.getItem("played")) {
        alert("Už ste hrali");
        return;
    }

    spinning = true;

    const spin = 3000 + Math.random() * 2000;
    const duration = 5000;
    const start = performance.now();

    function animate(now) {
        const elapsed = now - start;
        if (elapsed < duration) {
            rotation = (spin * (1 - Math.pow(1 - elapsed / duration, 3))) % 360;
            canvas.style.transform = `rotate(${rotation}deg)`;
            requestAnimationFrame(animate);
        } else {
            finishSpin(rotation);
        }
    }

    requestAnimationFrame(animate);
}

function finishSpin(deg) {
    const index = Math.floor(((360 - deg + 18) % 360) / (360 / segments.length));
    const landed = segments[index];

    let resultText = landed;

    if (prizeMapping[landed]) {
        const prize = prizeMapping[landed];

        if (limits[prize] > 0) {
            limits[prize]--;
            resultText = "Vyhrali ste: " + prize;
        } else {
            resultText = "Táto výhra už nie je dostupná";
        }
    }

    document.getElementById("result").innerText = resultText;
    localStorage.setItem("played", "1");
    spinning = false;
}
</script>

</body>
</html>
