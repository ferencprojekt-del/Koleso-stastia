<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Diversey Koleso šťastia</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f4f4f4;
}
.container {
    display: flex;
    gap: 40px;
}
#wheel {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 10px solid #333;
    position: relative;
    overflow: hidden;
    transition: transform 5s cubic-bezier(.17,.67,.12,.99);
}
.segment {
    position: absolute;
    width: 50%;
    height: 50%;
    left: 50%;
    top: 50%;
    transform-origin: 0% 0%;
    background: #ddd;
    border: 1px solid #999;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 13px;
    text-align: center;
    padding: 5px;
}
#pointer {
    width: 0;
    height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-bottom: 40px solid red;
    position: absolute;
    top: -40px;
    left: 175px;
}
.form-box {
    width: 300px;
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}
button {
    width: 100%;
    padding: 12px;
    background: #2ecc71;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
}
button:hover {
    background: #27ae60;
}
</style>
</head>
<body>

<div class="container">

    <div style="position:relative;">
        <div id="pointer"></div>
        <div id="wheel"></div>
    </div>

    <div class="form-box">
        <h2>Diversey Koleso šťastia</h2>

        <input id="name" placeholder="Vaše meno">
        <input id="email" placeholder="Váš email">
        <input id="phone" placeholder="Vaše tel. číslo">

        <label>
            <input type="checkbox" id="consent"> Súhlasím so spracovaním údajov
        </label>

        <button onclick="spinWheel()">ROZTOČ KOLESO!</button>

        <p id="result" style="font-weight:bold; margin-top:15px;"></p>
    </div>

</div>

<script>
// TEXTY SEGMENTOV
const segments = [
    "Mrzí ma to",
    "Dnes to nevyšlo",
    "Temer! Ešte raz skúste",
    "Veľký balík čistiacich prostriedkov",
    "Radosť zo záradenia",
    "Lesseau mydlá",
    "Cify",
    "Vzorka TAP! DEO",
    "Úsmev na tvári",
    "To je škoda!",
    "Čistý deň s penou"
];

// LIMITY VÝHIER
let limits = {
    "Veľký balík čistiacich prostriedkov": 1,
    "Lesseau mydlá": 1,
    "Cify": 6,
    "Vzorka TAP! DEO": 40
};

// VYKRESLENIE KOLESA
const wheel = document.getElementById("wheel");
const segAngle = 360 / segments.length;

segments.forEach((text, i) => {
    const div = document.createElement("div");
    div.className = "segment";
    div.style.transform = `rotate(${i * segAngle}deg) skewY(${90 - segAngle}deg)`;
    div.style.background = `hsl(${i * 30}, 80%, 70%)`;
    div.innerHTML = text;
    wheel.appendChild(div);
});

let spinning = false;

function spinWheel() {
    if (spinning) return;

    // FORM VALIDÁCIA
    if (!name.value || !email.value || !phone.value) {
        alert("Vyplňte všetky údaje");
        return;
    }
    if (!consent.checked) {
        alert("Musíte súhlasiť so spracovaním údajov");
        return;
    }

    // JEDEN POKUS NA HRÁČA
    if (localStorage.getItem("played")) {
        alert("Už ste hrali");
        return;
    }

    spinning = true;

    const randomSpin = 3600 + Math.floor(Math.random() * 360);
    wheel.style.transform = `rotate(${randomSpin}deg)`;

    setTimeout(() => {
        const finalDeg = randomSpin % 360;
        const index = Math.floor((360 - finalDeg) / segAngle) % segments.length;
        const result = segments[index];

        // KONTROLA LIMITOV
        if (limits[result] !== undefined) {
            if (limits[result] > 0) {
                limits[result]--;
                document.getElementById("result").innerText = "Vyhrali ste: " + result;
            } else {
                document.getElementById("result").innerText = "Výhra už nie je dostupná";
            }
        } else {
            document.getElementById("result").innerText = result;
        }

        localStorage.setItem("played", "1");
        spinning = false;

    }, 5200);
}
</script>

</body>
</html>
