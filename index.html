<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>index.html</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; font-family: Arial; }
  #wheel {
    width: 400px;
    height: 400px;
    border-radius: 50%;
    border: 8px solid #333;
    position: relative;
    overflow: hidden;
    transition: transform 5s cubic-bezier(.17,.67,.12,1.03);
  }
  .segment {
    position: absolute;
    width: 50%;
    height: 50%;
    top: 50%;
    left: 50%;
    transform-origin: 0% 0%;
    background: orange;
    border: 1px solid #000;
  }
  #pointer {
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 40px solid red;
    margin-top: 20px;
  }
  button { margin-top: 20px; padding: 10px 20px; font-size: 18px; }
</style>
</head>
<body>

<h1>Koleso šťastia</h1>
<div id="pointer"></div>
<div id="wheel"></div>
<button onclick="spin()">Točiť</button>

<script>
const segments = ["10 €", "20 €", "Prehra", "Bonus", "Opakuj", "50 €"];
const wheel = document.getElementById("wheel");

// Vytvor segmenty
segments.forEach((text, i) => {
  const seg = document.createElement("div");
  seg.className = "segment";
  seg.style.transform = `rotate(${i * (360 / segments.length)}deg) skewY(${90 - 360 / segments.length}deg)`;
  seg.style.background = i % 2 ? "#f7c531" : "#ff8c00";
  seg.innerHTML = `<div style="transform: skewY(${-(90 - 360 / segments.length)}deg) rotate(${(360 / segments.length)/2}deg); position:absolute; top:-100%; left:10%; font-size:20px;">${text}</div>`;
  wheel.appendChild(seg);
});

let angle = 0;

function spin() {
  const segmentAngle = 360 / segments.length;
  const randomSegment = Math.floor(Math.random() * segments.length);
  const extraTurns = 5 * 360;

  angle = extraTurns + (360 - randomSegment * segmentAngle - segmentAngle / 2);

  wheel.style.transform = `rotate(${angle}deg)`;

  setTimeout(() => {
    alert("Výsledok: " + segments[randomSegment]);
  }, 5200);
}
</script>

</body>
</html>
